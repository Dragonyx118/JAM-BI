[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

build_flags =
  -D USER_SETUP_LOADED=1
  -D ST7796_DRIVER=1        
  -D TFT_MOSI=23
  -D TFT_SCLK=18
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=4
  -D TFT_MISO=19            
  -D SPI_FREQUENCY=27000000
  -D TFT_RGB_ORDER=TFT_BGR
  -D LOAD_GLCD=1      ; Attiva il Font 1 standard
  -D LOAD_FONT2=1     ; <--- Forza l'attivazione del Font 2 (Usato nei sotto-menu)
  -D LOAD_FONT4=1     ; <--- Forza l'attivazione del Font 4 (Usato nei pulsanti grandi)